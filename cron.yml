name: AI新聞 - 毎朝配信

on:
  schedule:
    # 毎朝 04:00 JST = UTC 19:00（前日）
    - cron: "0 19 * * *"
  # 手動実行ボタン（テスト用）
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run（Discordに送らない）"
        required: false
        default: "false"
        type: boolean

jobs:
  publish:
    name: 朝刊生成・配信
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js 20 をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 依存パッケージをインストール
        run: npm ci

      - name: AI新聞を生成・配信
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node src/cron.js --dry-run
          else
            node src/cron.js
          fi

      - name: 失敗時のアラート（オプション）
        if: failure()
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          content: "🚨 **AI新聞の生成に失敗しました**\nGitHub Actions のログを確認してください。"
